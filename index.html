<!DOCTYPE html>
<html lang="en"> <!-- Changed lang to en -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum DEX - Crypto Asset Management</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Favicon (optional) -->
    <!-- <link rel="icon" href="/favicon.ico"> -->

</head>
<body>

    <header>
        <div class="header-content"> <!-- Wrapper for content within header -->
            <div class="header-left">
                <h1>Quantum DEX</h1>
            </div>
            <div class="header-center">
                <ul class="nav nav-tabs" id="myTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="swap-tab-button" data-bs-toggle="tab" data-bs-target="#swap-tab" type="button" role="tab" aria-controls="swap-tab" aria-selected="true">Swap</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="bridge-tab-button" data-bs-toggle="tab" data-bs-target="#bridge-tab" type="button" role="tab" aria-controls="bridge-tab" aria-selected="false">Bridge</button>
                    </li>
                     <li class="nav-item" role="presentation">
                        <button class="nav-link" id="telegram-tab-button" data-bs-toggle="tab" data-bs-target="#telegram-tab" type="button" role="tab" aria-controls="telegram-tab" aria-selected="false">Telegram</button>
                    </li>
                </ul>
            </div>
            <div class="header-right">
                <div id="wallet-status">
                    <button id="connect-wallet-btn" class="btn btn-sm">Connect Wallet</button>
                    <span id="wallet-address" class="d-none"></span>
                    <span id="wallet-network" class="d-none"></span>
                    <button id="disconnect-wallet-btn" class="btn btn-sm d-none">Disconnect</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container"> <!-- Bootstrap container for overall padding -->
        <div class="main-content-wrapper"> <!-- Custom wrapper for max-width -->
            <div class="tab-content" id="myTabContent">
                <!-- Swap Tab Content -->
                <div class="tab-pane fade show active" id="swap-tab" role="tabpanel" aria-labelledby="swap-tab-button">
                    <div id="swap-form" class="form-section">
                        <h2>Token Swap</h2>
                        <div class="form-card">
                            <div class="form-label-row"><label for="swap-network-select" class="form-label">Swap Network</label></div>
                            <select class="form-select" id="swap-network-select"></select>
                        </div>

                        <div id="swap-from-section" class="form-card">
                             <div class="form-label-row"><label for="swap-from-amount" class="form-label">Send</label></div>
                             <div class="input-group">
                                <input type="number" class="form-control" id="swap-from-amount" placeholder="0" min="0">
                                <button class="btn token-select-btn" id="swap-from-token-btn" type="button" data-type="from">Select Token</button>
                             </div>
                             <small id="swap-from-balance" class="form-text text-muted"></small>
                        </div>

                        <div class="swap-button-container">
                            <button id="swap-direction-btn" class="btn btn-secondary btn-sm rounded-circle">
                                 <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="arrow-down" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><path fill="currentColor" d="M169.4 470.6c12.5 12.5 32.8 12.5 45.3 0l160-160c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L224 370.8 224 64c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 306.7L54.6 265.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l160 160z"></path></svg>
                             </button>
                        </div>

                        <div id="swap-to-section" class="form-card">
                             <div class="form-label-row"><label for="swap-to-amount" class="form-label">Receive (approx.)</label></div>
                             <div class="input-group">
                                <input type="text" class="form-control" id="swap-to-amount" placeholder="0" readonly>
                                 <button class="btn token-select-btn" id="swap-to-token-btn" type="button" data-type="to">Select Token</button>
                             </div>
                        </div>

                         <div id="swap-details" class="alert alert-info mt-3 d-none">
                         </div>

                        <button id="get-swap-quote-btn" class="btn btn-primary w-100">Get Quote</button>
                        <button id="execute-swap-btn" class="btn btn-success w-100 d-none">Execute Swap</button>

                        <p id="swap-status" class="mt-3"></p>
                    </div>
                </div>

                <!-- Bridge Tab Content -->
                <div class="tab-pane fade" id="bridge-tab" role="tabpanel" aria-labelledby="bridge-tab-button">
                     <div id="bridge-form" class="form-section">
                        <h2>Token Bridge</h2>
                         <div id="bridge-from-network-section" class="form-card">
                             <div class="form-label-row"><label for="bridge-from-network" class="form-label">From Network</label></div>
                            <select class="form-select" id="bridge-from-network"></select>
                             <div class="form-label-row mt-2"><label for="bridge-from-amount" class="form-label">Send</label></div>
                             <div class="input-group">
                                <input type="number" class="form-control" id="bridge-from-amount" placeholder="0" min="0">
                                 <button class="btn token-select-btn" id="bridge-from-token-btn" type="button" data-type="from">Select Token</button>
                             </div>
                             <small id="bridge-from-balance" class="form-text text-muted"></small>
                         </div>
                        <div class="swap-button-container">
                            <button id="bridge-direction-btn" class="btn btn-secondary btn-sm rounded-circle">
                                 <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="arrow-down" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><path fill="currentColor" d="M169.4 470.6c12.5 12.5 32.8 12.5 45.3 0l160-160c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L224 370.8 224 64c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 306.7L54.6 265.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l160 160z"></path></svg>
                             </button>
                        </div>
                         <div id="bridge-to-network-section" class="form-card">
                             <div class="form-label-row"><label for="bridge-to-network" class="form-label">To Network</label></div>
                            <select class="form-select" id="bridge-to-network"></select>
                             <div class="form-label-row mt-2"><label for="bridge-to-amount" class="form-label">Receive (approx.)</label></div>
                             <div class="input-group">
                                <input type="text" class="form-control" id="bridge-to-amount" placeholder="0" readonly>
                                 <button class="btn token-select-btn" id="bridge-to-token-btn" type="button" data-type="to">Select Token</button>
                             </div>
                         </div>
                          <div id="bridge-details" class="alert alert-info mt-3 d-none">
                         </div>
                         <button id="get-bridge-quote-btn" class="btn btn-primary w-100">Find Best Route</button>
                        <button id="execute-bridge-btn" class="btn btn-success w-100 d-none">Execute Bridge</button>
                         <p id="bridge-status" class="mt-3"></p>
                     </div>
                </div>

                 <!-- Telegram Tab Content -->
                 <div class="tab-pane fade" id="telegram-tab" role="tabpanel" aria-labelledby="telegram-tab-button">
                     <div id="telegram-section" class="form-section">
                        <h2>Telegram Notifications</h2>
                         <p id="telegram-status" class="lead">Status: Not Connected.</p>
                         <button id="link-telegram-btn" class="btn btn-primary">Link Telegram</button>
                         <div id="telegram-linking-info" class="alert mt-3 d-none">
                             <p class="mb-1">Send the following code to our bot <a href="#" id="telegram-bot-link" target="_blank" class="alert-link">@Your_Bot_Name</a> in Telegram:</p>
                             <p><strong id="telegram-linking-code"></strong></p>
                              <p class="mb-0"><small>Status will update automatically after sending the code (may take some time).</small></p>
                         </div>
                          <button id="unlink-telegram-btn" class="btn btn-danger d-none">Unlink Telegram</button>
                         <p id="telegram-message" class="mt-3"></p>
                     </div>
                 </div>
            </div> <!-- /tab-content -->
        </div> <!-- /main-content-wrapper -->
    </main>

    <!-- Token Picker Modal -->
    <div class="modal fade" id="token-picker-modal" tabindex="-1" aria-labelledby="tokenPickerModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="tokenPickerModalLabel">Select Token</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                     <input type="text" class="form-control" id="token-search" placeholder="Search token...">
                    <ul id="token-list">
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Transaction Status Modal -->
    <div class="modal fade" id="transaction-status-modal" tabindex="-1" aria-labelledby="transactionStatusModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="transactionStatusModalLabel">Transaction Status</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <p id="transaction-modal-status" class="fw-bold mb-2"></p>
                    <p id="transaction-modal-hash" class="text-muted small mb-3"></p>
                    <a href="#" id="transaction-modal-explorer-link" target="_blank" class="btn btn-secondary btn-sm d-none">View on Explorer</a>
                </div>
            </div>
        </div>
    </div>

    <!-- === JavaScript Libraries === -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

    <!-- === Your Custom JavaScript Files === -->
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/wallet.js"></script>
    <script src="js/swap.js"></script>
    <script src="js/bridge.js"></script>
    <script src="js/telegram.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
